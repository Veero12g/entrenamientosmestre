<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrenamientos Mestre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Space Grotesk', system-ui, sans-serif !important; }
    html, body { background: #020817 !important; min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #a3e635, #22d3ee); border-radius: 99px; }

    /* Keyframes */
    @keyframes blob {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(50px,-70px) scale(1.12); }
      66%      { transform: translate(-35px,35px) scale(0.88); }
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes slide-up { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scale-in { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
    @keyframes fade-in { from{opacity:0} to{opacity:1} }
    @keyframes glow-pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes gradient-x {
      0%,100% { background-position:0% 50%; }
      50%      { background-position:100% 50%; }
    }
    @keyframes count-pop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }

    /* Utility classes */
    .animate-blob        { animation: blob 14s ease-in-out infinite; }
    .animate-float       { animation: float 5s ease-in-out infinite; }
    .animate-slide-up    { animation: slide-up 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    .animate-scale-in    { animation: scale-in 0.35s cubic-bezier(0.16,1,0.3,1) both; }
    .animate-fade-in     { animation: fade-in 0.4s ease both; }
    .animate-glow-pulse  { animation: glow-pulse 2.5s ease-in-out infinite; }
    .animate-gradient-x  { background-size:300% 300%; animation:gradient-x 8s ease infinite; }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #a3e635, #22d3ee);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; display:inline-block;
    }
    .gradient-text-warm {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; display:inline-block;
    }
    .gradient-text-violet {
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; display:inline-block;
    }

    /* Glass surfaces */
    .glass {
      background: rgba(2,8,23,0.75) !important;
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    }
    .glass-card {
      background: rgba(15,23,42,0.55) !important;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }

    /* Card lift on hover */
    .card-lift { transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease; }
    .card-lift:hover { transform: translateY(-7px) scale(1.01); box-shadow: 0 30px 60px rgba(0,0,0,0.55); }

    /* Primary button glow */
    .btn-glow {
      background: linear-gradient(135deg, #a3e635, #65a30d) !important;
      box-shadow: 0 4px 22px rgba(163,230,53,0.45) !important;
      color: #020817 !important; font-weight: 700 !important;
      transition: all 0.2s ease !important;
    }
    .btn-glow:hover { box-shadow: 0 8px 38px rgba(163,230,53,0.7) !important; transform: translateY(-1px) !important; }
    .btn-glow:active { transform: translateY(0) !important; }

    /* Nav active pill */
    .nav-active {
      background: linear-gradient(135deg, #a3e635, #65a30d) !important;
      box-shadow: 0 4px 20px rgba(163,230,53,0.5) !important;
      color: #020817 !important;
    }

    /* Glow borders by color */
    .glow-lime   { border: 1px solid rgba(163,230,53,0.22) !important; box-shadow: 0 0 40px rgba(163,230,53,0.07) inset, 0 2px 30px rgba(163,230,53,0.05) !important; }
    .glow-cyan   { border: 1px solid rgba(34,211,238,0.22) !important; box-shadow: 0 0 40px rgba(34,211,238,0.07) inset !important; }
    .glow-amber  { border: 1px solid rgba(245,158,11,0.22) !important; box-shadow: 0 0 40px rgba(245,158,11,0.07) inset !important; }
    .glow-violet { border: 1px solid rgba(167,139,250,0.22) !important; box-shadow: 0 0 40px rgba(167,139,250,0.07) inset !important; }
    .glow-emerald{ border: 1px solid rgba(52,211,153,0.22) !important; box-shadow: 0 0 40px rgba(52,211,153,0.07) inset !important; }

    /* Hero animated background */
    .hero-bg {
      background: linear-gradient(-45deg, #091f11, #0b1929, #13102a, #091f11);
      background-size: 400% 400%;
      animation: gradient-x 10s ease infinite;
    }

    /* Modal animation */
    .modal-sheet { animation: slide-up 0.42s cubic-bezier(0.16,1,0.3,1) both; }

    /* ── Nuevas animaciones fun ── */
    @keyframes confetti-fall {
      0%   { transform: translateY(-30px) rotate(0deg) scale(1); opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(680deg) scale(0.5); opacity: 0; }
    }
    @keyframes bounce-in {
      0%   { transform: scale(0.2) translateY(16px); opacity: 0; }
      55%  { transform: scale(1.08) translateY(-4px); opacity: 1; }
      80%  { transform: scale(0.97); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes wiggle-icon {
      0%,100% { transform: rotate(0); }
      20%  { transform: rotate(-14deg) scale(1.1); }
      40%  { transform: rotate(14deg) scale(1.1); }
      60%  { transform: rotate(-9deg); }
      80%  { transform: rotate(9deg); }
    }
    @keyframes toast-in {
      from { transform: translateX(110%) scale(0.85); opacity: 0; }
      to   { transform: translateX(0) scale(1); opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(110%); opacity: 0; }
    }
    @keyframes shine-sweep {
      0%   { transform: translateX(-120%) skewX(-20deg); }
      100% { transform: translateX(250%) skewX(-20deg); }
    }
    @keyframes pop-num {
      0%,100% { transform: scale(1); }
      40%     { transform: scale(1.18); }
    }
    @keyframes sparkle {
      0%   { transform: scale(0) rotate(0); opacity: 1; }
      50%  { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
      100% { transform: scale(0) rotate(360deg); opacity: 0; }
    }
    @keyframes emoji-pop {
      0%   { transform: scale(0) translateY(0); opacity: 0; }
      30%  { transform: scale(1.4) translateY(-10px); opacity: 1; }
      60%  { transform: scale(1) translateY(-20px); opacity: 1; }
      100% { transform: scale(0.7) translateY(-40px); opacity: 0; }
    }
    @keyframes nav-ping {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(2); opacity: 0; }
    }

    .animate-bounce-in { animation: bounce-in 0.55s cubic-bezier(0.34,1.56,0.64,1) both; }
    .animate-wiggle     { animation: wiggle-icon 0.5s ease both; }
    .animate-toast-in   { animation: toast-in 0.42s cubic-bezier(0.16,1,0.3,1) both; }
    .animate-toast-out  { animation: toast-out 0.35s ease forwards; }
    .animate-pop-num    { animation: pop-num 0.4s ease both; }

    /* Shine sweep on primary buttons */
    .btn-glow { position: relative !important; overflow: hidden !important; }
    .btn-glow::after {
      content: '';
      position: absolute; top: 0; left: 0; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: translateX(-120%) skewX(-20deg);
      pointer-events: none;
    }
    .btn-glow:hover::after { animation: shine-sweep 0.65s ease forwards; }

    /* Stagger delays for grid items */
    .stagger-1 { animation-delay: 0.04s !important; }
    .stagger-2 { animation-delay: 0.08s !important; }
    .stagger-3 { animation-delay: 0.12s !important; }
    .stagger-4 { animation-delay: 0.16s !important; }
    .stagger-5 { animation-delay: 0.20s !important; }
    .stagger-6 { animation-delay: 0.24s !important; }
    .stagger-7 { animation-delay: 0.28s !important; }
    .stagger-8 { animation-delay: 0.32s !important; }

    /* Nav ping ring on active */
    .nav-ping::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: rgba(163,230,53,0.4);
      animation: nav-ping 1.8s cubic-bezier(0,0,0.2,1) infinite;
    }
    .nav-active { position: relative; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.storage = {
      get: async (key) => {
        const value = localStorage.getItem(key);
        return value !== null ? { value } : null;
      },
      set: async (key, value) => {
        localStorage.setItem(key, value);
      }
    };
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ── Iconos SVG ─────────────────────────────────────────────────────── */
    function SvgIcon({ d, className }) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={className}>
          {d}
        </svg>
      );
    }

    const Users = (p) => <SvgIcon {...p} d={<>
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </>} />;

    const Dumbbell = (p) => <SvgIcon {...p} d={<>
      <path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/>
      <path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/>
    </>} />;

    const BarChart3 = (p) => <SvgIcon {...p} d={<>
      <path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
    </>} />;

    const Plus = (p) => <SvgIcon {...p} d={<>
      <path d="M5 12h14"/><path d="M12 5v14"/>
    </>} />;

    const Trash2 = (p) => <SvgIcon {...p} d={<>
      <path d="M3 6h18"/>
      <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
      <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
      <line x1="10" x2="10" y1="11" y2="17"/>
      <line x1="14" x2="14" y1="11" y2="17"/>
    </>} />;

    const Edit2 = (p) => <SvgIcon {...p} d={<>
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </>} />;

    const X = (p) => <SvgIcon {...p} d={<>
      <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
    </>} />;

    const ChevronRight = (p) => <SvgIcon {...p} d={<>
      <path d="m9 18 6-6-6-6"/>
    </>} />;

    const Calendar = (p) => <SvgIcon {...p} d={<>
      <path d="M8 2v4"/><path d="M16 2v4"/>
      <rect width="18" height="18" x="3" y="4" rx="2"/>
      <path d="M3 10h18"/>
    </>} />;

    const TrendingUp = (p) => <SvgIcon {...p} d={<>
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </>} />;

    const Activity = (p) => <SvgIcon {...p} d={<>
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </>} />;

    const Target = (p) => <SvgIcon {...p} d={<>
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="6"/>
      <circle cx="12" cy="12" r="2"/>
    </>} />;

    const Flame = (p) => <SvgIcon {...p} d={<>
      <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
    </>} />;

    const Award = (p) => <SvgIcon {...p} d={<>
      <circle cx="12" cy="8" r="6"/>
      <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>
    </>} />;

    const Save = (p) => <SvgIcon {...p} d={<>
      <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
      <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
      <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
    </>} />;

    const ArrowLeft = (p) => <SvgIcon {...p} d={<>
      <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
    </>} />;

    const Phone = (p) => <SvgIcon {...p} d={<>
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.49 11 19.79 19.79 0 0 1 1.21 2.45A2 2 0 0 1 3.22.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 9a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16z"/>
    </>} />;

    const Mail = (p) => <SvgIcon {...p} d={<>
      <rect width="20" height="16" x="2" y="4" rx="2"/>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </>} />;

    const Zap = (p) => <SvgIcon {...p} d={<>
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </>} />;

    const User = (p) => <SvgIcon {...p} d={<>
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </>} />;

    const Receipt = (p) => <SvgIcon {...p} d={<>
      <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"/>
      <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/>
      <path d="M12 17.5v-11"/>
    </>} />;

    const CheckCircle = (p) => <SvgIcon {...p} d={<>
      <circle cx="12" cy="12" r="10"/>
      <path d="m9 12 2 2 4-4"/>
    </>} />;

    const Clock = (p) => <SvgIcon {...p} d={<>
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </>} />;

    /* ── Gráficas CSS (sin librería externa) ────────────────────────────── */
    function BarChartCSS({ data, labelKey, valueKey }) {
      const max = Math.max(...data.map(d => d[valueKey]), 1);
      return (
        <div className="flex items-end gap-2 h-40 pt-6">
          {data.map((d, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <span className="text-[10px] text-lime-400 font-bold">{d[valueKey]}</span>
              <div
                className="w-full bg-lime-400 rounded-t transition-all"
                style={{ height: `${Math.max((d[valueKey] / max) * 100, 4)}%` }}
              />
              <span className="text-[10px] text-slate-500 whitespace-nowrap">{d[labelKey]}</span>
            </div>
          ))}
        </div>
      );
    }

    function PieChartCSS({ data, colors }) {
      const total = data.reduce((s, d) => s + d.value, 0) || 1;
      return (
        <div className="space-y-3 py-2">
          {data.map((d, i) => (
            <div key={i} className="flex items-center gap-3">
              <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ backgroundColor: colors[i % colors.length] }} />
              <div className="flex-1">
                <div className="flex justify-between text-sm mb-1">
                  <span className="font-semibold">{d.name}</span>
                  <span className="text-slate-400">{d.value} ({Math.round(d.value / total * 100)}%)</span>
                </div>
                <div className="w-full bg-slate-800 rounded-full h-2">
                  <div className="h-2 rounded-full transition-all" style={{ width: `${d.value / total * 100}%`, backgroundColor: colors[i % colors.length] }} />
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function HBarChartCSS({ data, nameKey, valueKey }) {
      const max = Math.max(...data.map(d => d[valueKey]), 1);
      return (
        <div className="space-y-3 py-2">
          {data.map((d, i) => (
            <div key={i} className="flex items-center gap-3">
              <div className="w-28 text-sm text-slate-300 truncate">{d[nameKey]}</div>
              <div className="flex-1 bg-slate-800 rounded-full h-5 overflow-hidden">
                <div
                  className="h-5 bg-lime-400 rounded-full transition-all"
                  style={{ width: `${(d[valueKey] / max) * 100}%` }}
                />
              </div>
              <div className="w-6 text-sm font-black text-lime-400">{d[valueKey]}</div>
            </div>
          ))}
        </div>
      );
    }

    /* ── Sistema global de eventos ─────────────────────────────────────── */
    const _bus = { toast: [], confetti: [] };
    const showToast = (msg, type = 'success') => _bus.toast.forEach(fn => fn({ msg, type, id: Date.now() + Math.random() }));
    const fireConfetti = () => _bus.confetti.forEach(fn => fn());

    /* ── CountUp: número que anima desde 0 ─────────────────────────────── */
    function CountUp({ to }) {
      const { useEffect: ue, useState: us, useRef: ur } = React;
      const n = Number(to) || 0;
      const [val, setVal] = us(0);
      const prev = ur(n);
      ue(() => {
        const start = Date.now();
        const from = prev.current;
        prev.current = n;
        const dur = 700;
        const tick = () => {
          const t = Math.min((Date.now() - start) / dur, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(Math.round(from + (n - from) * eased));
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }, [n]);
      return <>{val}</>;
    }

    /* ── Confetti burst ─────────────────────────────────────────────────── */
    function Confetti() {
      const [particles, setParticles] = useState([]);
      useEffect(() => {
        const fire = () => {
          const colors = ['#a3e635','#22d3ee','#f59e0b','#a78bfa','#ec4899','#34d399','#fff'];
          const shapes = ['50%','4px','0'];
          setParticles(Array.from({ length: 70 }, (_, i) => ({
            id: i + Date.now(),
            color: colors[i % colors.length],
            x: 15 + Math.random() * 70,
            delay: Math.random() * 0.7,
            dur: 1.4 + Math.random() * 1.2,
            size: 5 + Math.random() * 8,
            radius: shapes[Math.floor(Math.random() * shapes.length)],
          })));
          setTimeout(() => setParticles([]), 3200);
        };
        _bus.confetti.push(fire);
        return () => { const i = _bus.confetti.indexOf(fire); if (i >= 0) _bus.confetti.splice(i, 1); };
      }, []);
      if (!particles.length) return null;
      return (
        <div className="fixed inset-0 pointer-events-none z-[300] overflow-hidden">
          {particles.map(p => (
            <div key={p.id} className="absolute"
              style={{
                left: `${p.x}%`, top: '-20px',
                width: p.size, height: p.size,
                borderRadius: p.radius,
                background: p.color,
                animation: `confetti-fall ${p.dur}s ${p.delay}s ease-out forwards`,
              }} />
          ))}
        </div>
      );
    }

    /* ── Toast notifications ─────────────────────────────────────────────── */
    function ToastContainer() {
      const [toasts, setToasts] = useState([]);
      useEffect(() => {
        const fn = (t) => {
          setToasts(p => [...p, t]);
          setTimeout(() => setToasts(p => p.filter(x => x.id !== t.id)), 3200);
        };
        _bus.toast.push(fn);
        return () => { const i = _bus.toast.indexOf(fn); if (i >= 0) _bus.toast.splice(i, 1); };
      }, []);
      const ICONS = { success: '💪', error: '✕', info: 'ℹ️' };
      const COLORS = {
        success: 'linear-gradient(135deg,#a3e635,#65a30d)',
        error:   'linear-gradient(135deg,#ef4444,#dc2626)',
        info:    'linear-gradient(135deg,#22d3ee,#0891b2)',
      };
      return (
        <div className="fixed top-5 right-5 z-[250] flex flex-col gap-2.5 pointer-events-none" style={{ maxWidth: 260 }}>
          {toasts.map(t => (
            <div key={t.id} className="animate-toast-in flex items-center gap-3 px-4 py-3 rounded-2xl shadow-2xl pointer-events-auto"
              style={{ background: COLORS[t.type] || COLORS.success, color: '#020817', fontWeight: 700, fontSize: 13 }}>
              <span className="text-lg leading-none">{ICONS[t.type] || ICONS.success}</span>
              <span>{t.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    /* ── EmojiPop: reacción flotante ─────────────────────────────────────── */
    function EmojiPop({ emoji, trigger }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        if (!trigger) return;
        setVisible(true);
        const t = setTimeout(() => setVisible(false), 1000);
        return () => clearTimeout(t);
      }, [trigger]);
      if (!visible) return null;
      return (
        <div className="fixed inset-0 pointer-events-none z-[200] flex items-center justify-center">
          <span style={{ fontSize: 64, animation: 'emoji-pop 1s ease forwards' }}>{emoji}</span>
        </div>
      );
    }

    /* ── App principal ──────────────────────────────────────────────────── */
    function EntrenamientosMestre() {
      const [section, setSection] = useState('inicio');
      const [clients, setClients] = useState([]);
      const [workouts, setWorkouts] = useState([]);
      const [selectedClient, setSelectedClient] = useState(null);
      const [editingWorkout, setEditingWorkout] = useState(null);
      const [showClientForm, setShowClientForm] = useState(false);
      const [showWorkoutForm, setShowWorkoutForm] = useState(false);
      const [sessions, setSessions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [emojiTrigger, setEmojiTrigger] = useState(0);
      const [emojiChar, setEmojiChar] = useState('💪');

      const celebrate = (emoji = '💪') => {
        setEmojiChar(emoji);
        setEmojiTrigger(t => t + 1);
        fireConfetti();
      };

      useEffect(() => {
        const load = async () => {
          try { const c = await window.storage.get('clients'); if (c) setClients(JSON.parse(c.value)); } catch (e) {}
          try { const w = await window.storage.get('workouts'); if (w) setWorkouts(JSON.parse(w.value)); } catch (e) {}
          try { const s = await window.storage.get('sessions'); if (s) setSessions(JSON.parse(s.value)); } catch (e) {}
          setLoading(false);
        };
        load();
      }, []);

      const saveClients = async (list) => {
        setClients(list);
        try { await window.storage.set('clients', JSON.stringify(list)); } catch (e) {}
      };
      const saveWorkouts = async (list) => {
        setWorkouts(list);
        try { await window.storage.set('workouts', JSON.stringify(list)); } catch (e) {}
      };
      const saveSessions = async (list) => {
        setSessions(list);
        try { await window.storage.set('sessions', JSON.stringify(list)); } catch (e) {}
      };

      const addClient = (client) => {
        saveClients([...clients, { ...client, id: Date.now().toString(), createdAt: new Date().toISOString() }]);
        setShowClientForm(false);
        celebrate('🎉');
        showToast('¡Cliente añadido con éxito!');
      };
      const deleteClient = (id) => {
        if (!confirm('¿Eliminar este cliente y todos sus entrenamientos?')) return;
        saveClients(clients.filter(c => c.id !== id));
        saveWorkouts(workouts.filter(w => w.clientId !== id));
        if (selectedClient?.id === id) setSelectedClient(null);
        showToast('Cliente eliminado', 'error');
      };
      const addWorkout = (workout) => {
        if (editingWorkout) {
          saveWorkouts(workouts.map(w => w.id === editingWorkout.id ? { ...workout, id: editingWorkout.id } : w));
          setEditingWorkout(null);
          showToast('Entrenamiento actualizado ✓', 'info');
        } else {
          saveWorkouts([...workouts, { ...workout, id: Date.now().toString(), createdAt: new Date().toISOString() }]);
          celebrate('💪');
          showToast('¡Entrenamiento creado!');
        }
        setShowWorkoutForm(false);
      };
      const deleteWorkout = (id) => {
        if (confirm('¿Eliminar este entrenamiento?')) {
          saveWorkouts(workouts.filter(w => w.id !== id));
          showToast('Entrenamiento eliminado', 'error');
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="flex flex-col items-center gap-4">
              <div className="w-16 h-16 rounded-2xl btn-glow flex items-center justify-center animate-float">
                <Flame className="w-8 h-8" style={{ color: '#020817' }} />
              </div>
              <div className="gradient-text text-lg font-black tracking-wider">CARGANDO...</div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen text-white relative">
          {/* Blobs de fondo animados */}
          <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
            <div className="absolute top-[-15%] left-[-10%] w-[700px] h-[700px] rounded-full animate-blob"
              style={{ background: 'radial-gradient(circle, rgba(163,230,53,0.12), transparent 70%)', filter: 'blur(60px)' }} />
            <div className="absolute top-[35%] right-[-8%] w-[550px] h-[550px] rounded-full animate-blob"
              style={{ background: 'radial-gradient(circle, rgba(34,211,238,0.1), transparent 70%)', filter: 'blur(60px)', animationDelay: '4s' }} />
            <div className="absolute bottom-[-10%] left-[25%] w-[500px] h-[500px] rounded-full animate-blob"
              style={{ background: 'radial-gradient(circle, rgba(167,139,250,0.09), transparent 70%)', filter: 'blur(60px)', animationDelay: '8s' }} />
          </div>

          <header className="glass border-b sticky top-0 z-40" style={{ borderColor: 'rgba(163,230,53,0.12)' }}>
            <div className="max-w-7xl mx-auto px-4 pt-4 pb-1 flex items-center gap-4">
              {/* Logo */}
              <div className="flex items-center gap-3 flex-shrink-0">
                <div className="relative">
                  <div className="w-10 h-10 rounded-xl btn-glow flex items-center justify-center">
                    <Flame className="w-5 h-5" style={{ color: '#020817' }} />
                  </div>
                  <div className="absolute inset-0 rounded-xl animate-glow-pulse pointer-events-none"
                    style={{ background: 'rgba(163,230,53,0.35)', filter: 'blur(10px)', zIndex: -1 }} />
                </div>
                <div>
                  <h1 className="text-base font-black tracking-tight leading-none">
                    <span className="gradient-text">MESTRE</span>
                  </h1>
                  <p className="text-[9px] text-slate-500 font-semibold tracking-[0.2em] uppercase mt-0.5">Training Platform</p>
                </div>
              </div>
            </div>

            {/* Nav tabs */}
            <nav className="max-w-7xl mx-auto px-3 pb-3 flex gap-1 overflow-x-auto">
              {[
                { id: 'inicio', icon: Activity, label: 'Inicio' },
                { id: 'clientes', icon: Users, label: 'Clientes' },
                { id: 'entrenamientos', icon: Dumbbell, label: 'Entrenos' },
                { id: 'calendario', icon: Calendar, label: 'Calendario' },
                { id: 'analiticas', icon: BarChart3, label: 'Analíticas' },
                { id: 'facturas', icon: Receipt, label: 'Facturas' },
              ].map(({ id, icon: Icon, label }) => {
                const active = section === id;
                return (
                  <button key={id} onClick={() => { setSection(id); setSelectedClient(null); }}
                    className={`flex items-center gap-1.5 px-3 py-2 rounded-xl font-semibold text-sm whitespace-nowrap transition-all ${active ? 'nav-active' : 'text-slate-500 hover:text-slate-200 hover:bg-white/5'}`}>
                    <Icon className="w-4 h-4 flex-shrink-0" />
                    <span className={active ? 'hidden sm:inline' : 'hidden sm:inline'}>{label}</span>
                  </button>
                );
              })}
            </nav>
          </header>

          <main className="max-w-7xl mx-auto p-4 md:p-6 relative z-10">
            {section === 'inicio' && <Inicio clients={clients} workouts={workouts} sessions={sessions} onSaveSessions={saveSessions} setSection={setSection} />}
            {section === 'clientes' && (
              selectedClient
                ? <ClientDetail client={selectedClient} workouts={workouts.filter(w => w.clientId === selectedClient.id)}
                    onBack={() => setSelectedClient(null)}
                    onAddWorkout={() => { setEditingWorkout(null); setShowWorkoutForm(true); }}
                    onEditWorkout={(w) => { setEditingWorkout(w); setShowWorkoutForm(true); }}
                    onDeleteWorkout={deleteWorkout} onDeleteClient={() => deleteClient(selectedClient.id)} />
                : <Clientes clients={clients} workouts={workouts} onAdd={() => setShowClientForm(true)} onSelect={setSelectedClient} onDelete={deleteClient} />
            )}
            {section === 'entrenamientos' && (
              <Entrenamientos workouts={workouts} clients={clients}
                onAdd={() => { setEditingWorkout(null); setShowWorkoutForm(true); }}
                onEdit={(w) => { setEditingWorkout(w); setShowWorkoutForm(true); }}
                onDelete={deleteWorkout} />
            )}
            {section === 'calendario' && <Calendario sessions={sessions} clients={clients} workouts={workouts} onSaveSessions={saveSessions} />}
            {section === 'analiticas' && <Analiticas clients={clients} workouts={workouts} />}
            {section === 'facturas' && <Facturas clients={clients} sessions={sessions} workouts={workouts} />}
          </main>

          {showClientForm && <ClientForm onSave={addClient} onClose={() => setShowClientForm(false)} />}
          {showWorkoutForm && (
            <WorkoutForm clients={clients} preselectedClient={selectedClient} editing={editingWorkout}
              onSave={addWorkout} onClose={() => { setShowWorkoutForm(false); setEditingWorkout(null); }} />
          )}

          {/* Animaciones globales */}
          <Confetti />
          <ToastContainer />
          <EmojiPop emoji={emojiChar} trigger={emojiTrigger} />
        </div>
      );
    }

    /* ── Inicio ─────────────────────────────────────────────────────────── */
    function Inicio({ clients, workouts, sessions, onSaveSessions, setSection }) {
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];

      const [selectedDay, setSelectedDay] = useState(todayStr);
      const [showForm, setShowForm] = useState(false);
      const [editingSession, setEditingSession] = useState(null);

      // Semana actual Lun–Dom
      const weekStart = new Date(today);
      weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));
      const weekDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(weekStart);
        d.setDate(weekStart.getDate() + i);
        return d;
      });
      const DAY_LABELS = ['L','M','X','J','V','S','D'];

      const sessionsByDate = {};
      sessions.forEach(s => {
        if (!sessionsByDate[s.date]) sessionsByDate[s.date] = [];
        sessionsByDate[s.date].push(s);
      });

      const thisWeekCount = sessions.filter(s => {
        const d = new Date(s.date);
        return d >= weekStart && d <= weekDays[6];
      }).length;

      const todayCount = (sessionsByDate[todayStr] || []).length;
      const clientColors = ['#a3e635','#22d3ee','#34d399','#f59e0b','#a78bfa'];

      // Sesiones del día seleccionado
      const selSessions = (sessionsByDate[selectedDay] || [])
        .slice().sort((a, b) => a.time.localeCompare(b.time));

      const selDate = new Date(selectedDay + 'T00:00:00');
      const isSelToday = selectedDay === todayStr;
      const selLabel = isSelToday
        ? 'Hoy'
        : selDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

      const saveSession = (session) => {
        if (editingSession) {
          onSaveSessions(sessions.map(s => s.id === editingSession.id ? { ...session, id: editingSession.id } : s));
          setEditingSession(null);
          showToast('Sesión actualizada ✓', 'info');
        } else {
          onSaveSessions([...sessions, { ...session, id: Date.now().toString() }]);
          fireConfetti();
          showToast('¡Sesión creada! 🗓️');
        }
        setShowForm(false);
      };
      const deleteSession = (id) => {
        if (confirm('¿Eliminar esta sesión?')) onSaveSessions(sessions.filter(s => s.id !== id));
      };

      // Próximas sesiones fuera de la semana actual
      const lastWeekDay = weekDays[6].toISOString().split('T')[0];
      const upcomingSessions = sessions
        .filter(s => s.date > lastWeekDay)
        .sort((a, b) => a.date === b.date ? a.time.localeCompare(b.time) : a.date.localeCompare(b.date))
        .slice(0, 4);

      return (
        <div className="space-y-6">
          {/* Hero */}
          <div className="relative rounded-3xl overflow-hidden hero-bg p-7 md:p-10">
            {/* Glow blobs internos */}
            <div className="absolute top-0 left-0 w-72 h-72 rounded-full pointer-events-none"
              style={{ background: 'radial-gradient(circle, rgba(163,230,53,0.18), transparent 70%)', filter: 'blur(50px)' }} />
            <div className="absolute bottom-0 right-0 w-56 h-56 rounded-full pointer-events-none"
              style={{ background: 'radial-gradient(circle, rgba(34,211,238,0.15), transparent 70%)', filter: 'blur(50px)' }} />
            {/* Badge superior */}
            <div className="relative z-10 inline-flex items-center gap-2 mb-5"
              style={{ background: 'rgba(255,255,255,0.06)', backdropFilter: 'blur(10px)', borderRadius: 999, padding: '5px 14px', border: '1px solid rgba(255,255,255,0.1)' }}>
              <div className="w-2 h-2 rounded-full bg-lime-400 animate-pulse" />
              <span className="text-xs text-slate-300 font-semibold tracking-[0.15em] uppercase">Panel del entrenador</span>
            </div>
            <div className="relative z-10">
              <h2 className="text-4xl md:text-6xl font-black leading-none mb-3">
                <span className="gradient-text">¡Vamos</span>
                <span className="text-white"> al lío!</span>
              </h2>
              <p className="text-slate-400 text-sm font-medium max-w-sm">
                Gestiona clientes, planifica entrenamientos y analiza progresos en tiempo real.
              </p>
            </div>
            {/* Icono decorativo flotante */}
            <div className="absolute right-6 top-6 md:right-10 md:top-10 opacity-10 pointer-events-none animate-float">
              <Flame className="w-24 h-24 md:w-32 md:h-32 text-lime-400" />
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <StatCard icon={Users} value={clients.length} label="Clientes activos" color="lime" />
            <StatCard icon={Dumbbell} value={workouts.length} label="Entrenamientos" color="emerald" />
            <StatCard icon={Calendar} value={thisWeekCount} label="Sesiones esta semana" color="cyan" />
            <StatCard icon={Activity} value={todayCount} label="Sesiones hoy" color="violet" />
          </div>

          {/* Semana interactiva */}
          <div className="rounded-2xl overflow-hidden" style={{ background: 'rgba(10,18,35,0.8)', border: '1px solid rgba(255,255,255,0.06)' }}>
            {/* Tira de días */}
            <div className="p-4 border-b" style={{ borderColor: 'rgba(255,255,255,0.06)' }}>
              <div className="flex items-center justify-between mb-4">
                <span className="text-xs font-bold text-slate-500 tracking-[0.15em] uppercase">Esta semana</span>
                <button onClick={() => setSection('calendario')}
                  className="text-xs text-lime-400 hover:text-lime-300 font-semibold flex items-center gap-1 transition-colors">
                  Ver mes <ChevronRight className="w-3 h-3" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1.5">
                {weekDays.map((d, i) => {
                  const ds = d.toISOString().split('T')[0];
                  const isToday = ds === todayStr;
                  const isSelected = ds === selectedDay;
                  const daySessions = sessionsByDate[ds] || [];
                  return (
                    <button key={i} onClick={() => setSelectedDay(ds)}
                      className="flex flex-col items-center py-2.5 px-1 rounded-2xl transition-all"
                      style={
                        isToday
                          ? { background: 'linear-gradient(135deg,#a3e635,#65a30d)', boxShadow: '0 4px 18px rgba(163,230,53,0.4)' }
                          : isSelected
                          ? { background: 'rgba(163,230,53,0.12)', border: '1px solid rgba(163,230,53,0.35)' }
                          : { background: 'transparent' }
                      }>
                      <span className="text-[9px] font-bold mb-1" style={{ color: isToday ? '#020817' : '#64748b' }}>{DAY_LABELS[i]}</span>
                      <span className="text-base font-black leading-none" style={{ color: isToday ? '#020817' : isSelected ? '#a3e635' : '#fff' }}>{d.getDate()}</span>
                      <div className="flex gap-0.5 mt-1.5 flex-wrap justify-center min-h-[6px]">
                        {daySessions.slice(0, 3).map((s, idx) => {
                          const ci = clients.findIndex(c => c.id === s.clientId);
                          return <div key={idx} className="w-1.5 h-1.5 rounded-full"
                            style={{ backgroundColor: isToday ? 'rgba(2,8,23,0.5)' : clientColors[ci % clientColors.length] }} />;
                        })}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Panel del día seleccionado */}
            <div className="p-4">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <span className="font-black capitalize text-lg">{selLabel}</span>
                  {selSessions.length > 0 && (
                    <span className="ml-2 text-xs text-slate-500">{selSessions.length} {selSessions.length === 1 ? 'sesión' : 'sesiones'}</span>
                  )}
                </div>
                <button onClick={() => { setEditingSession(null); setShowForm(true); }}
                  className="btn-glow px-3 py-1.5 rounded-xl flex items-center gap-1.5 text-sm">
                  <Plus className="w-4 h-4" />Nueva sesión
                </button>
              </div>

              {selSessions.length === 0 ? (
                /* Sin sesiones → invitar a crear */
                <div className="flex flex-col items-center py-8 gap-3">
                  <div className="w-14 h-14 rounded-2xl flex items-center justify-center"
                    style={{ background: 'rgba(163,230,53,0.06)', border: '1px solid rgba(163,230,53,0.12)' }}>
                    <Calendar className="w-6 h-6" style={{ color: 'rgba(163,230,53,0.4)' }} />
                  </div>
                  <p className="text-slate-500 text-sm">Sin sesiones para este día</p>
                  <button onClick={() => { setEditingSession(null); setShowForm(true); }}
                    className="btn-glow px-6 py-2.5 rounded-xl flex items-center gap-2 text-sm mt-1">
                    <Plus className="w-4 h-4" />Crear sesión
                  </button>
                </div>
              ) : (
                /* Con sesiones → lista editable */
                <div className="space-y-2">
                  {selSessions.map(s => {
                    const client = clients.find(c => c.id === s.clientId);
                    const workout = workouts.find(w => w.id === s.workoutId);
                    const ci = clients.findIndex(c => c.id === s.clientId);
                    const color = clientColors[ci % clientColors.length];
                    return (
                      <div key={s.id} className="flex items-start gap-3 p-3 bg-slate-950 rounded-xl border-l-4"
                        style={{ borderLeftColor: color }}>
                        {/* Hora */}
                        <div className="min-w-[48px] text-center pt-0.5">
                          <div className="text-base font-black" style={{ color }}>{s.time}</div>
                        </div>
                        {/* Info */}
                        <div className="flex-1 min-w-0">
                          <div className="font-bold text-sm">{client?.name || 'Cliente eliminado'}</div>
                          <div className="flex flex-wrap gap-x-2 gap-y-0.5 mt-0.5">
                            {s.tipo && (
                              <span className="text-[11px] font-semibold text-slate-400">{s.tipo}</span>
                            )}
                            {workout && (
                              <span className="text-[11px] text-lime-400/80 truncate max-w-[160px]">
                                📋 {workout.name}
                              </span>
                            )}
                          </div>
                          {/* Ejercicios del entreno vinculado */}
                          {workout && workout.exercises && workout.exercises.length > 0 && (
                            <div className="mt-1.5 space-y-0.5">
                              {workout.exercises.slice(0, 3).map((ex, idx) => (
                                <div key={idx} className="text-[10px] text-slate-500">
                                  {idx + 1}. {ex.name}
                                  {ex.sets && ex.reps ? ` — ${ex.sets}×${ex.reps}` : ''}
                                </div>
                              ))}
                              {workout.exercises.length > 3 && (
                                <div className="text-[10px] text-slate-600">+{workout.exercises.length - 3} ejercicios más</div>
                              )}
                            </div>
                          )}
                          {s.notes && <p className="text-[11px] text-slate-500 italic mt-1">"{s.notes}"</p>}
                        </div>
                        {/* Acciones */}
                        <div className="flex flex-col gap-1 flex-shrink-0">
                          <button onClick={() => { setEditingSession(s); setShowForm(true); }}
                            className="p-1.5 text-slate-500 hover:text-lime-400 transition rounded-lg hover:bg-slate-800">
                            <Edit2 className="w-3.5 h-3.5" />
                          </button>
                          <button onClick={() => deleteSession(s.id)}
                            className="p-1.5 text-slate-500 hover:text-red-400 transition rounded-lg hover:bg-slate-800">
                            <Trash2 className="w-3.5 h-3.5" />
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Próximas sesiones (fuera de la semana) */}
          {upcomingSessions.length > 0 && (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5">
              <h3 className="font-bold mb-3 flex items-center gap-2 text-sm">
                <TrendingUp className="w-4 h-4 text-lime-400" />Próximas semanas
              </h3>
              <div className="space-y-2">
                {upcomingSessions.map(s => {
                  const client = clients.find(c => c.id === s.clientId);
                  const ci = clients.findIndex(c => c.id === s.clientId);
                  const sd = new Date(s.date + 'T00:00:00');
                  const label = sd.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
                  return (
                    <div key={s.id} className="flex items-center gap-3 p-2.5 bg-slate-950 rounded-xl">
                      <div className="min-w-[60px] text-center">
                        <div className="text-[10px] font-bold text-slate-500 capitalize">{label}</div>
                        <div className="text-sm font-black text-white">{s.time}</div>
                      </div>
                      <div className="w-0.5 h-7 rounded-full" style={{ backgroundColor: clientColors[ci % clientColors.length] }} />
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-sm">{client?.name || '—'}</div>
                        {s.tipo && <div className="text-[11px] text-slate-500">{s.tipo}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Accesos rápidos */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {[
              { section: 'clientes', Icon: Users, label: 'Clientes', desc: 'Fichas, objetivos y progreso.', color: '#a3e635', bg: 'rgba(163,230,53,0.08)', border: 'rgba(163,230,53,0.2)' },
              { section: 'entrenamientos', Icon: Dumbbell, label: 'Entrenos', desc: 'Rutinas personalizadas de funcional y TRX.', color: '#22d3ee', bg: 'rgba(34,211,238,0.08)', border: 'rgba(34,211,238,0.2)' },
            ].map(({ section: s, Icon, label, desc, color, bg, border }) => (
              <button key={s} onClick={() => setSection(s)}
                className="card-lift rounded-2xl p-5 text-left group relative overflow-hidden"
                style={{ background: 'rgba(10,18,35,0.8)', border: `1px solid rgba(255,255,255,0.07)` }}>
                <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-2xl"
                  style={{ background: `radial-gradient(circle at 0 0, ${bg}, transparent 70%)` }} />
                <div className="relative z-10">
                  <div className="flex items-center justify-between mb-3">
                    <div className="w-11 h-11 rounded-xl flex items-center justify-center"
                      style={{ background: bg, border: `1px solid ${border}` }}>
                      <Icon className="w-5 h-5" style={{ color }} />
                    </div>

    /* ── Analíticas ─────────────────────────────────────────────────────── */
    function Analiticas({ clients, workouts }) {
      const [filterId, setFilterId] = useState('all');

      const filtered = filterId === 'all' ? workouts : workouts.filter(w => w.clientId === filterId);
      const client = clients.find(c => c.id === filterId);
      const COLORS = ['#a3e635', '#22d3ee', '#34d399'];

      // ── Recopilar todos los ejercicios de los entrenamientos filtrados ──
      const allExercises = [];
      filtered.forEach(w => { w.exercises?.forEach(ex => allExercises.push(ex)); });

      // ── VOLUMEN: series × reps ──
      const totalVolumen = allExercises.reduce((s, ex) => s + (ex.sets || 0) * (ex.reps || 0), 0);
      const volumenPorMes = {};
      filtered.forEach(w => {
        const d = new Date(w.date);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`;
        const vol = w.exercises?.reduce((s, ex) => s + (ex.sets || 0) * (ex.reps || 0), 0) || 0;
        volumenPorMes[key] = (volumenPorMes[key] || 0) + vol;
      });
      const volumenChart = Object.entries(volumenPorMes).sort().slice(-6).map(([k, v]) => {
        const m = parseInt(k.split('-')[1]) - 1;
        return { month: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m], vol: v };
      });

      // ── INTENSIDAD: RPE medio (1–10) ──
      const exsConRPE = allExercises.filter(ex => ex.intensidad && ex.intensidad >= 1);
      const avgRPE = exsConRPE.length
        ? (exsConRPE.reduce((s, ex) => s + Number(ex.intensidad), 0) / exsConRPE.length).toFixed(1)
        : null;
      const rpeColor = !avgRPE ? '#64748b'
        : avgRPE < 4 ? '#22d3ee' : avgRPE < 6 ? '#a3e635' : avgRPE < 8 ? '#f59e0b' : '#ef4444';
      const rpeLabel = !avgRPE ? '—'
        : avgRPE < 4 ? 'Muy fácil' : avgRPE < 6 ? 'Moderada' : avgRPE < 8 ? 'Alta' : 'Máxima';
      const rpeByWorkout = filtered.map(w => {
        const exs = (w.exercises || []).filter(ex => ex.intensidad);
        const avg = exs.length ? exs.reduce((s, ex) => s + Number(ex.intensidad), 0) / exs.length : null;
        const d = new Date(w.date);
        return { month: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()], rpe: avg ? Math.round(avg * 10) / 10 : 0 };
      }).filter(x => x.rpe > 0).slice(-6);

      // ── RESISTENCIA: tonelaje + desglose por tipo ──
      let tonelaje = 0;
      const tipoResCount = {};
      const trxInclinaciones = [];
      const gomaLevels = {};
      allExercises.forEach(ex => {
        const tipo = ex.tipoResistencia || 'Peso libre';
        tipoResCount[tipo] = (tipoResCount[tipo] || 0) + 1;
        tonelaje += (ex.sets || 0) * (ex.reps || 0) * (ex.weight || 0);
        if (tipo === 'TRX' && ex.inclinacion) trxInclinaciones.push(Number(ex.inclinacion));
        if (tipo === 'Goma elástica' && ex.nivelGoma) gomaLevels[ex.nivelGoma] = (gomaLevels[ex.nivelGoma] || 0) + 1;
      });
      const avgTRX = trxInclinaciones.length
        ? Math.round(trxInclinaciones.reduce((s, v) => s + v, 0) / trxInclinaciones.length) : null;
      const tipoResData = Object.entries(tipoResCount).map(([name, value]) => ({ name, value }));

      // ── FATIGA: volumen por grupo muscular ──
      const musculoVol = {};
      allExercises.forEach(ex => {
        if (ex.musculo) {
          musculoVol[ex.musculo] = (musculoVol[ex.musculo] || 0) + (ex.sets || 0) * (ex.reps || 0);
        }
      });
      const fatigaData = Object.entries(musculoVol)
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) => ({ name, count }));

      // ── Datos mensuales (sesiones) ──
      const monthlyData = {};
      filtered.forEach(w => {
        const d = new Date(w.date);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        monthlyData[key] = (monthlyData[key] || 0) + 1;
      });
      const monthlyChart = Object.entries(monthlyData).sort().slice(-6).map(([k, v]) => {
        const m = parseInt(k.split('-')[1]) - 1;
        return { month: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m], entrenamientos: v };
      });

      // Por tipo
      const typeCount = {};
      filtered.forEach(w => { const t = w.type || 'Funcional'; typeCount[t] = (typeCount[t] || 0) + 1; });
      const typeData = Object.entries(typeCount).map(([name, value]) => ({ name, value }));

      // Top clientes (solo vista global)
      const clientCount = {};
      workouts.forEach(w => { clientCount[w.clientId] = (clientCount[w.clientId] || 0) + 1; });
      const topClients = Object.entries(clientCount)
        .map(([id, count]) => ({ name: clients.find(c => c.id === id)?.name || null, count }))
        .filter(c => c.name).sort((a, b) => b.count - a.count).slice(0, 5);

      // Kg totales (legacy)
      let totalKg = tonelaje;

      // Duración media y último entreno (vista individual)
      const withDuration = filtered.filter(w => w.duration);
      const avgDuration = withDuration.length
        ? Math.round(withDuration.reduce((s, w) => s + Number(w.duration), 0) / withDuration.length) : 0;
      const sorted = filtered.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
      const daysSinceLast = sorted[0]
        ? Math.floor((new Date() - new Date(sorted[0].date)) / 86400000) : null;
      const lastLabel = daysSinceLast === null ? '—' : daysSinceLast === 0 ? 'Hoy' : daysSinceLast === 1 ? 'Ayer' : `${daysSinceLast}d`;

      // ── GRÁFICA RESUMEN POR FECHA ──
      const workoutsByDate = {};
      filtered.forEach(w => {
        if (!workoutsByDate[w.date]) workoutsByDate[w.date] = [];
        workoutsByDate[w.date].push(w);
      });
      const chartData = Object.entries(workoutsByDate)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([date, ws]) => {
          const exs = ws.flatMap(w => w.exercises || []);
          const vol = exs.reduce((s, ex) => s + (ex.sets||0)*(ex.reps||0), 0);
          const exsRPE = exs.filter(ex => ex.intensidad && ex.intensidad >= 1);
          const inten = exsRPE.length ? exsRPE.reduce((s, ex) => s + Number(ex.intensidad), 0) / exsRPE.length : 0;
          const res = exs.reduce((s, ex) => s + (ex.sets||0)*(ex.reps||0)*(ex.weight||0), 0);
          return { date, volumen: vol, intensidad: Math.round(inten * 10) / 10, resistencia: Math.round(res) };
        });

      return (
        <div className="space-y-6 animate-slide-up">
          <div>
            <h2 className="text-3xl md:text-4xl font-black"><span className="gradient-text-violet">Analíticas</span></h2>

                  {[
                    { color: '#a3e635', label: 'Volumen (reps)' },

              {/* Gráficas */}
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                {monthlyChart.length > 0 && (
