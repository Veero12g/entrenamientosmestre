    }

    function MiniStat({ icon: Icon, label, value, suffix }) {
      return (
        <div className="rounded-xl p-4" style={{ background: 'rgba(10,18,35,0.8)', border: '1px solid rgba(255,255,255,0.07)' }}>
          <Icon className="w-4 h-4 mb-2" style={{ color: '#a3e635' }} />
          <div className="text-xl md:text-2xl font-black truncate text-white">
            {value}{suffix && <span className="text-xs text-slate-500 ml-1">{suffix}</span>}
          </div>
          <div className="text-[11px] text-slate-500 mt-0.5">{label}</div>
        </div>
      );
    }

    function LineChartInteractive({ data }) {
      const [hoverIdx, setHoverIdx] = useState(null);

      if (!data || data.length === 0) return (
        <p className="text-xs text-slate-600 italic py-6 text-center">
          Sin datos suficientes — registra entrenamientos con ejercicios para ver la evolución
        </p>
      );

      const W = 600, H = 220;
      const PAD = { top: 24, right: 24, bottom: 44, left: 24 };
      const cW = W - PAD.left - PAD.right;
      const cH = H - PAD.top - PAD.bottom;
      const n = data.length;

      const xOf = (i) => n < 2 ? PAD.left + cW / 2 : PAD.left + (i / (n - 1)) * cW;
      const maxVol = Math.max(...data.map(d => d.volumen), 1);
      const maxInt = Math.max(...data.map(d => d.intensidad), 10);
      const maxRes = Math.max(...data.map(d => d.resistencia), 1);
      const yOf = (val, max) => PAD.top + cH - (val / max) * cH;

      const METRICS = [
        { key: 'volumen',     max: maxVol, color: '#a3e635', label: 'Volumen' },
        { key: 'intensidad',  max: maxInt, color: '#f59e0b', label: 'Intensidad' },
        { key: 'resistencia', max: maxRes, color: '#22d3ee', label: 'Resistencia' },
      ];

      // Curva suavizada (catmull-rom → cubic bezier)
      const smoothPath = (key, max) => {
        if (n < 2) return '';
        const pts = data.map((d, i) => [xOf(i), yOf(d[key], max)]);
        let p = `M${pts[0][0]},${pts[0][1]}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const x1 = pts[i][0] + (pts[i+1][0] - (i > 0 ? pts[i-1][0] : pts[i][0])) / 6;
          const y1 = pts[i][1] + (pts[i+1][1] - (i > 0 ? pts[i-1][1] : pts[i][1])) / 6;
          const x2 = pts[i+1][0] - (i < pts.length-2 ? pts[i+2][0] - pts[i][0] : pts[i+1][0] - pts[i][0]) / 6;
          const y2 = pts[i+1][1] - (i < pts.length-2 ? pts[i+2][1] - pts[i][1] : pts[i+1][1] - pts[i][1]) / 6;
          p += ` C${x1},${y1} ${x2},${y2} ${pts[i+1][0]},${pts[i+1][1]}`;
        }
        return p;
      };

      // Área rellena bajo cada línea
      const areaPath = (key, max) => {
        if (n < 2) return '';
        const pts = data.map((d, i) => [xOf(i), yOf(d[key], max)]);
        let p = `M${pts[0][0]},${PAD.top + cH}`;
        p += ` L${pts[0][0]},${pts[0][1]}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const x1 = pts[i][0] + (pts[i+1][0] - (i > 0 ? pts[i-1][0] : pts[i][0])) / 6;
          const y1 = pts[i][1] + (pts[i+1][1] - (i > 0 ? pts[i-1][1] : pts[i][1])) / 6;
          const x2 = pts[i+1][0] - (i < pts.length-2 ? pts[i+2][0] - pts[i][0] : pts[i+1][0] - pts[i][0]) / 6;
          const y2 = pts[i+1][1] - (i < pts.length-2 ? pts[i+2][1] - pts[i][1] : pts[i+1][1] - pts[i][1]) / 6;
          p += ` C${x1},${y1} ${x2},${y2} ${pts[i+1][0]},${pts[i+1][1]}`;
        }
        p += ` L${pts[pts.length-1][0]},${PAD.top + cH} Z`;
        return p;
      };

      const fmtDate = (dateStr) => {
        const dt = new Date(dateStr + 'T00:00:00');
        return dt.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
      };
      const showXLabel = (i) => n <= 7 || i === 0 || i === n-1 || i % Math.ceil(n / 6) === 0;

      const hd = hoverIdx !== null ? data[hoverIdx] : null;
      const tooltipFlip = hoverIdx !== null && hoverIdx > n * 0.6;

      return (
        <div className="relative select-none" onMouseLeave={() => setHoverIdx(null)}>
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full overflow-visible">
            <defs>
              {METRICS.map(m => (
                <linearGradient key={m.key} id={`grad-${m.key}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={m.color} stopOpacity="0.18" />
                  <stop offset="100%" stopColor={m.color} stopOpacity="0" />
                </linearGradient>
              ))}
            </defs>

            {/* Grid */}
            {[0, 0.25, 0.5, 0.75, 1].map((v, i) => (
              <line key={i} x1={PAD.left} x2={W - PAD.right}
                y1={PAD.top + cH * (1-v)} y2={PAD.top + cH * (1-v)}
                stroke="#1e293b" strokeWidth="1" />
            ))}

            {/* Áreas */}
            {METRICS.map(m => (
              <path key={`area-${m.key}`} d={areaPath(m.key, m.max)}
                fill={`url(#grad-${m.key})`}
                opacity={hoverIdx !== null ? 0.3 : 0.7} />
            ))}

            {/* Líneas */}
            {METRICS.map(m => (
              <path key={m.key} d={smoothPath(m.key, m.max)} fill="none"
                stroke={m.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                opacity={hoverIdx !== null ? 0.4 : 1} />
            ))}

            {/* Puntos */}
            {data.map((d, i) =>
              METRICS.map(m => (
                <circle key={`${m.key}-${i}`} cx={xOf(i)} cy={yOf(d[m.key], m.max)}
                  r={hoverIdx === i ? 6 : 3.5}
                  fill={hoverIdx === i ? m.color : '#0f172a'}
                  stroke={m.color} strokeWidth="2"
                  opacity={hoverIdx !== null && hoverIdx !== i ? 0.2 : 1} />
              ))
            )}

            {/* Línea vertical hover */}
            {hoverIdx !== null && (
              <line x1={xOf(hoverIdx)} x2={xOf(hoverIdx)}
                y1={PAD.top} y2={PAD.top + cH}
                stroke="#ffffff" strokeWidth="1" strokeDasharray="4,3" opacity="0.2" />
            )}

            {/* Etiquetas eje X */}
            {data.map((d, i) => showXLabel(i) && (
              <text key={i} x={xOf(i)} y={H - 5} textAnchor="middle" fill="#475569" fontSize="9">
                {fmtDate(d.date)}
              </text>
            ))}

            {/* Zonas hover invisibles */}
            {data.map((d, i) => {
              const x1 = i === 0 ? PAD.left : (xOf(i-1) + xOf(i)) / 2;
              const x2 = i === n-1 ? PAD.left + cW : (xOf(i) + xOf(i+1)) / 2;
              return (
                <rect key={`hz${i}`} x={x1} y={PAD.top} width={x2-x1} height={cH}
                  fill="transparent" onMouseEnter={() => setHoverIdx(i)} />
              );
            })}
          </svg>

          {/* Tooltip */}
          {hd && (
            <div className="absolute top-0 pointer-events-none z-20"
              style={{
                left: `${(xOf(hoverIdx) / W) * 100}%`,
                transform: tooltipFlip ? 'translate(-108%, 4px)' : 'translate(10px, 4px)',
              }}>
              <div className="bg-slate-800 border border-slate-600 rounded-xl p-3 shadow-2xl min-w-[156px]">
                <div className="text-[11px] font-bold text-white mb-2 pb-1.5 border-b border-slate-700">
                  📅 {fmtDate(hd.date)}
                </div>
                {METRICS.map(m => (
                  <div key={m.key} className="flex items-center justify-between gap-3 mb-1.5 last:mb-0">
                    <div className="flex items-center gap-1.5">
                      <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: m.color }} />
                      <span className="text-[10px] text-slate-400">{m.label}</span>
                    </div>
                    <span className="text-[11px] font-black tabular-nums" style={{ color: m.color }}>
                      {m.key === 'intensidad'
                        ? (hd[m.key] > 0 ? `${hd[m.key]} RPE` : '—')
                        : m.key === 'resistencia'
                        ? `${hd[m.key].toLocaleString('es-ES')} kg`
                        : hd[m.key].toLocaleString('es-ES')}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function EmptyState({ icon: Icon, title, text }) {
      return (
        <div className="rounded-3xl p-12 text-center animate-fade-in"
          style={{ background: 'rgba(10,18,35,0.6)', border: '1px dashed rgba(255,255,255,0.08)' }}>
          <div className="w-20 h-20 rounded-3xl mx-auto mb-5 flex items-center justify-center"
            style={{ background: 'rgba(163,230,53,0.05)', border: '1px solid rgba(163,230,53,0.1)' }}>
            <Icon className="w-9 h-9" style={{ color: 'rgba(163,230,53,0.3)' }} />
          </div>
          <h3 className="font-black text-xl mb-2">{title}</h3>
          <p className="text-sm text-slate-500 max-w-xs mx-auto leading-relaxed">{text}</p>
        </div>
      );
    }

    /* ── Facturas ───────────────────────────────────────────────────────── */
    function Facturas({ clients, sessions, workouts }) {
      const { useState: us, useEffect: ue } = React;
      const [periodo, setPeriodo] = us('mes');
      const [cobradas, setCobradas] = us(() => {
        try { return JSON.parse(localStorage.getItem('facturas_cobradas') || '{}'); } catch { return {}; }
      });

      ue(() => {
        localStorage.setItem('facturas_cobradas', JSON.stringify(cobradas));
      }, [cobradas]);

      const now = new Date();

      const getRange = () => {
        if (periodo === 'semana') {
          const d = new Date(now);
          const dow = d.getDay();
          const diffToMon = dow === 0 ? -6 : 1 - dow;
          const mon = new Date(d); mon.setDate(d.getDate() + diffToMon); mon.setHours(0,0,0,0);
          const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
          const label = 'Semana del ' + mon.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })
            + ' al ' + sun.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
          return { from: mon, to: sun, label, key: `sem-${mon.toISOString().split('T')[0]}` };
        } else {
          const from = new Date(now.getFullYear(), now.getMonth(), 1);
          const to = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
          const label = now.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
          return { from, to, label, key: `mes-${now.getFullYear()}-${now.getMonth()}` };
        }
      };

      const { from, to, label, key: periodKey } = getRange();

      const rows = clients.map((client, ci) => {
        const clientSessions = sessions.filter(s => {
          if (s.clientId !== client.id) return false;
          const d = new Date(s.date + 'T00:00:00');
          return d >= from && d <= to;
        });
        const count = clientSessions.length;
        const precio = Number(client.precioSesion) || 0;
        const total = count * precio;
        const cobradoKey = `${client.id}-${periodKey}`;
        const cobrado = !!cobradas[cobradoKey];
        return { client, ci, count, precio, total, cobrado, cobradoKey };
      });

      const rowsConSesiones = rows.filter(r => r.count > 0);
      const rowsSinPrecio = rowsConSesiones.filter(r => r.precio === 0);
      const totalGeneral = rows.reduce((s, r) => s + r.total, 0);
      const totalCobrado = rows.filter(r => r.cobrado).reduce((s, r) => s + r.total, 0);
      const pendiente = totalGeneral - totalCobrado;

      const toggleCobrado = (key, total) => {
        const next = !cobradas[key];
        setCobradas(prev => ({ ...prev, [key]: next }));
        if (next) showToast(`Cobrado ✓ — ${total.toFixed(2)} €`);
        else showToast('Marcado como pendiente', 'info');
      };

      const SummaryCard = ({ label: l, amount, color, icon }) => (
        <div className="rounded-2xl p-4 flex flex-col gap-1 relative overflow-hidden"
          style={{ background: 'rgba(10,18,35,0.9)', border: `1px solid ${color}33` }}>
          <div className="absolute top-0 right-0 w-20 h-20 rounded-full opacity-10 -translate-y-6 translate-x-6"
            style={{ background: color }} />
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color }}>{icon} {l}</span>
          <span className="text-2xl font-black mt-1" style={{ color }}>
            {amount.toFixed(2)} €
          </span>
        </div>
      );

      return (
        <div className="space-y-6 animate-slide-up">
          {/* Header */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-3xl md:text-4xl font-black"><span className="gradient-text-violet">Facturas</span></h2>
              <p className="text-slate-500 text-sm mt-1 capitalize">{label}</p>
            </div>
            <div className="flex gap-1 p-1 rounded-xl" style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid rgba(255,255,255,0.06)' }}>
              {[['semana', 'Esta semana'], ['mes', 'Este mes']].map(([val, lbl]) => (
                <button key={val} onClick={() => setPeriodo(val)}
                  className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${periodo === val ? 'nav-active' : 'text-slate-500 hover:text-slate-200'}`}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          {/* Resumen */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <SummaryCard label="Total a cobrar" amount={totalGeneral} color="#a78bfa" icon="💶" />
            <SummaryCard label="Cobrado" amount={totalCobrado} color="#34d399" icon="✅" />
            <SummaryCard label="Pendiente" amount={pendiente} color="#f59e0b" icon="⏳" />
          </div>

          {/* Aviso clientes sin precio */}
          {rowsSinPrecio.length > 0 && (
            <div className="rounded-xl px-4 py-3 flex items-center gap-3 text-sm"
              style={{ background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.2)' }}>
              <span className="text-lg">⚠️</span>
              <span className="text-amber-300">
                {rowsSinPrecio.map(r => r.client.name).join(', ')}
                {rowsSinPrecio.length === 1 ? ' no tiene' : ' no tienen'} precio por sesión configurado.
                <button onClick={() => {}} className="underline ml-1 opacity-70">Edita el cliente para añadirlo.</button>
              </span>
            </div>
          )}

          {/* Tabla clientes */}
          {rowsConSesiones.length === 0 ? (
            <div className="rounded-3xl p-12 text-center animate-fade-in"
              style={{ background: 'rgba(10,18,35,0.6)', border: '1px dashed rgba(255,255,255,0.08)' }}>
              <div className="w-20 h-20 rounded-3xl mx-auto mb-5 flex items-center justify-center"
                style={{ background: 'rgba(167,139,250,0.06)', border: '1px solid rgba(167,139,250,0.12)' }}>
                <Receipt className="w-9 h-9" style={{ color: 'rgba(167,139,250,0.3)' }} />
              </div>
              <h3 className="font-black text-xl mb-2">Sin sesiones en este periodo</h3>
              <p className="text-sm text-slate-500 max-w-xs mx-auto leading-relaxed">
                Registra sesiones en el Calendario para que aparezcan aquí con su importe.
              </p>
            </div>
          ) : (
            <div className="rounded-2xl overflow-hidden" style={{ border: '1px solid rgba(255,255,255,0.07)' }}>
              {/* Header tabla */}
              <div className="grid grid-cols-12 px-5 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-600"
                style={{ background: 'rgba(5,12,28,0.95)', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                <div className="col-span-5">Cliente</div>
                <div className="col-span-2 text-center">Sesiones</div>
                <div className="col-span-2 text-center">€/sesión</div>
                <div className="col-span-2 text-right">Total</div>
                <div className="col-span-1 text-right">Cobrado</div>
              </div>
              {/* Filas */}
              <div style={{ background: 'rgba(10,18,35,0.92)' }}>
                {rowsConSesiones.map(({ client, ci, count, precio, total, cobrado, cobradoKey }, i) => (
                  <div key={client.id}
                    className={`grid grid-cols-12 items-center px-5 py-4 transition-all animate-bounce-in stagger-${Math.min(i+1,8)}`}
                    style={{
                      borderBottom: i < rowsConSesiones.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
                      background: cobrado ? 'rgba(52,211,153,0.04)' : 'transparent',
                    }}>
                    {/* Cliente */}
                    <div className="col-span-5 flex items-center gap-3">
                      <div className="w-10 h-10 rounded-xl flex items-center justify-center text-slate-950 font-black text-base flex-shrink-0"
                        style={{ background: CLIENT_GRADIENTS[ci % CLIENT_GRADIENTS.length] }}>
                        {client.name.charAt(0).toUpperCase()}
                      </div>
                      <div>
                        <p className="font-bold text-sm leading-tight">{client.name}</p>
                        {client.goal && <p className="text-[10px] text-slate-600 mt-0.5 truncate max-w-[120px]">{client.goal}</p>}
                      </div>
                    </div>
                    {/* Sesiones */}
                    <div className="col-span-2 text-center">
                      <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-black"
                        style={{ background: 'rgba(34,211,238,0.1)', color: '#22d3ee' }}>
                        {count}
                      </span>
                    </div>
                    {/* Precio */}
                    <div className="col-span-2 text-center text-sm font-semibold">
                      {precio > 0
                        ? <span style={{ color: '#a78bfa' }}>{precio} €</span>
                        : <span className="text-slate-700 text-xs">—</span>}
                    </div>
                    {/* Total */}
                    <div className="col-span-2 text-right">
                      <span className="text-lg font-black" style={{ color: cobrado ? '#34d399' : total > 0 ? '#fff' : '#334155' }}>
                        {total > 0 ? `${total.toFixed(2)} €` : '—'}
                      </span>
                    </div>
                    {/* Toggle cobrado */}
                    <div className="col-span-1 flex justify-end">
                      <button onClick={() => toggleCobrado(cobradoKey, total)}
                        title={cobrado ? 'Marcar como pendiente' : 'Marcar como cobrado'}
                        className="w-8 h-8 rounded-lg flex items-center justify-center transition-all text-sm"
                        style={cobrado
                          ? { background: 'rgba(52,211,153,0.2)', color: '#34d399', border: '1px solid rgba(52,211,153,0.35)' }
                          : { background: 'rgba(255,255,255,0.04)', color: '#475569', border: '1px solid rgba(255,255,255,0.07)' }}>
                        {cobrado ? <CheckCircle className="w-4 h-4" /> : <Clock className="w-4 h-4" />}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
              {/* Footer total */}
              <div className="flex items-center justify-between px-5 py-4"
                style={{ background: 'rgba(5,12,28,0.95)', borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                <span className="text-xs font-bold uppercase tracking-wider text-slate-500">
                  {rowsConSesiones.length} {rowsConSesiones.length === 1 ? 'cliente' : 'clientes'} · {rowsConSesiones.reduce((s,r)=>s+r.count,0)} sesiones
                </span>
                <div className="flex items-center gap-3">
                  <span className="text-xs text-slate-500 font-semibold">Total</span>
                  <span className="text-2xl font-black gradient-text-violet">{totalGeneral.toFixed(2)} €</span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── Formularios ────────────────────────────────────────────────────── */
    function ClientForm({ onSave, onClose }) {
      const [form, setForm] = useState({ name: '', age: '', phone: '', email: '', goal: '', notes: '', precioSesion: '' });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const handleSubmit = () => { if (!form.name.trim()) return alert('El nombre es obligatorio'); onSave(form); };
      return (
        <Modal title="Nuevo cliente" onClose={onClose}>
          <div className="space-y-3">
            <Input label="Nombre completo *" value={form.name} onChange={v => set('name', v)} placeholder="Ej: María García" />
            <div className="grid grid-cols-2 gap-3">
              <Input label="Edad" value={form.age} onChange={v => set('age', v)} type="number" placeholder="30" />
              <Input label="Teléfono" value={form.phone} onChange={v => set('phone', v)} placeholder="600 000 000" />
            </div>
            <Input label="Email" value={form.email} onChange={v => set('email', v)} type="email" placeholder="email@ejemplo.com" />
            <Input label="Objetivo" value={form.goal} onChange={v => set('goal', v)} placeholder="Ej: Perder peso, ganar fuerza..." />
            <div className="rounded-xl p-3" style={{ background: 'rgba(167,139,250,0.07)', border: '1px solid rgba(167,139,250,0.18)' }}>
              <label className="block text-sm font-bold mb-1" style={{ color: '#a78bfa' }}>
                💶 Precio por sesión (€)
              </label>
              <input
                type="number" min="0" step="0.5" value={form.precioSesion}
                onChange={e => set('precioSesion', e.target.value)}
                placeholder="Ej: 40"
                className="w-full bg-slate-950 border border-slate-700 focus:border-violet-500 rounded-lg px-3 py-2 text-sm outline-none transition"
              />
              <p className="text-[11px] text-slate-500 mt-1.5">Se usará para calcular las facturas automáticamente</p>
            </div>
            <div>
              <label className="block text-sm font-semibold text-slate-300 mb-1">Notas</label>
              <textarea value={form.notes} onChange={e => set('notes', e.target.value)} rows={3}
                className="w-full bg-slate-950 border border-slate-700 focus:border-lime-500 rounded-lg px-3 py-2 text-sm outline-none transition resize-none"
                placeholder="Lesiones, preferencias, observaciones..." />
            </div>
            <button onClick={handleSubmit} className="w-full btn-glow py-3 rounded-xl flex items-center justify-center gap-2">
              <Save className="w-5 h-5" />Guardar cliente
            </button>
          </div>
        </Modal>
      );
    }

    function WorkoutForm({ clients, preselectedClient, editing, onSave, onClose }) {
      const [form, setForm] = useState(editing || {
        clientId: preselectedClient?.id || clients[0]?.id || '',
        name: '', type: 'Funcional',
        date: new Date().toISOString().split('T')[0],
        duration: 60, exercises: [], notes: '',
      });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const addExercise = () => set('exercises', [...form.exercises, {
        name: '', sets: 3, reps: 12, weight: 0, rest: 60, notes: '',
        musculo: '', intensidad: '', tipoResistencia: 'Peso libre', inclinacion: '', nivelGoma: ''
      }]);
      const updateEx = (i, k, v) => {
        const arr = [...form.exercises]; arr[i] = { ...arr[i], [k]: v }; set('exercises', arr);
      };
      const removeEx = (i) => set('exercises', form.exercises.filter((_, idx) => idx !== i));

      const handleSubmit = () => {
        if (!form.name.trim()) return alert('El nombre del entrenamiento es obligatorio');
        if (!form.clientId) return alert('Selecciona un cliente');
        if (form.exercises.length === 0) return alert('Añade al menos un ejercicio');
        if (form.exercises.some(e => !e.name.trim())) return alert('Todos los ejercicios necesitan un nombre');
        onSave(form);
      };

      return (
        <Modal title={editing ? 'Editar entrenamiento' : 'Nuevo entrenamiento'} onClose={onClose}>
          <div className="space-y-3">
            <div>
              <label className="block text-sm font-semibold text-slate-300 mb-1">Cliente *</label>
              <select value={form.clientId} onChange={e => set('clientId', e.target.value)}
                className="w-full bg-slate-950 border border-slate-700 focus:border-lime-500 rounded-lg px-3 py-2 text-sm outline-none transition">
                <option value="">Selecciona un cliente</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <Input label="Nombre del entrenamiento *" value={form.name} onChange={v => set('name', v)} placeholder="Ej: Full body TRX - Día 1" />
            <div className="grid grid-cols-3 gap-3">
              <div>
                <label className="block text-sm font-semibold text-slate-300 mb-1">Tipo</label>
                <select value={form.type} onChange={e => set('type', e.target.value)}
                  className="w-full bg-slate-950 border border-slate-700 focus:border-lime-500 rounded-lg px-3 py-2 text-sm outline-none transition">
                  <option>Funcional</option><option>TRX</option><option>Mixto</option>
                </select>
              </div>
              <Input label="Fecha" value={form.date} onChange={v => set('date', v)} type="date" />
              <Input label="Duración (min)" value={form.duration} onChange={v => set('duration', v)} type="number" />
            </div>
            <div className="pt-3 border-t border-slate-800">
              <div className="flex items-center justify-between mb-3">
                <h4 className="font-bold flex items-center gap-2"><Dumbbell className="w-4 h-4 text-lime-400" />Ejercicios</h4>
                <button onClick={addExercise} className="text-xs bg-lime-400 hover:bg-lime-300 text-slate-950 font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition">
                  <Plus className="w-3 h-3" />Añadir
                </button>
              </div>
              {form.exercises.length === 0 && (
                <p className="text-sm text-slate-500 text-center py-4">Aún no hay ejercicios. Pulsa "Añadir" para empezar.</p>
              )}
              <div className="space-y-3">
                {form.exercises.map((ex, i) => (
                  <div key={i} className={`animate-bounce-in bg-slate-950 border border-slate-800 rounded-lg p-3 space-y-2 stagger-${Math.min(i + 1, 8)}`}>
                    {/* Nombre */}
                    <div className="flex items-center gap-2">
                      <span className="w-6 h-6 bg-lime-400/10 text-lime-400 rounded text-xs font-bold flex items-center justify-center flex-shrink-0">{i + 1}</span>
                      <input type="text" value={ex.name} onChange={e => updateEx(i, 'name', e.target.value)}
                        placeholder="Nombre del ejercicio" className="flex-1 bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1.5 text-sm outline-none" />
                      <button onClick={() => removeEx(i)} className="text-slate-500 hover:text-red-400 p-1 flex-shrink-0"><X className="w-4 h-4" /></button>
                    </div>

                    {/* Fila 1: volumen + descanso */}
                    <div className="grid grid-cols-4 gap-2">
                      <MiniInput label="Series" value={ex.sets} onChange={v => updateEx(i, 'sets', parseInt(v) || 0)} />
                      <MiniInput label="Reps" value={ex.reps} onChange={v => updateEx(i, 'reps', parseInt(v) || 0)} />
                      <MiniInput label="Kg" value={ex.weight} onChange={v => updateEx(i, 'weight', parseFloat(v) || 0)} step="0.5" />
                      <MiniInput label="Desc.(s)" value={ex.rest} onChange={v => updateEx(i, 'rest', parseInt(v) || 0)} />
                    </div>

                    {/* Fila 2: músculo + intensidad */}
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Grupo muscular</label>
                        <select value={ex.musculo || ''} onChange={e => updateEx(i, 'musculo', e.target.value)}
                          className="w-full bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1.5 text-xs outline-none transition">
                          <option value="">— Sin grupo —</option>
                          {['Core','Pecho','Espalda','Hombros','Bíceps','Tríceps','Piernas','Glúteos','Full Body','Cardio'].map(m => (
                            <option key={m} value={m}>{m}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Intensidad RPE (1–10)</label>
                        <input type="number" min="1" max="10" value={ex.intensidad || ''} onChange={e => updateEx(i, 'intensidad', parseInt(e.target.value) || '')}
                          placeholder="ej: 7" className="w-full bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1.5 text-sm outline-none transition" />
                      </div>
                    </div>

                    {/* Fila 3: tipo de resistencia + valor condicional */}
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo resistencia</label>
                        <select value={ex.tipoResistencia || 'Peso libre'} onChange={e => updateEx(i, 'tipoResistencia', e.target.value)}
                          className="w-full bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1.5 text-xs outline-none transition">
                          {['Peso libre','TRX','Goma elástica','Peso corporal','Máquina'].map(t => (
                            <option key={t} value={t}>{t}</option>
                          ))}
                        </select>
                      </div>
                      {ex.tipoResistencia === 'TRX' && (
                        <div>
                          <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Inclinación TRX (%)</label>
                          <input type="number" min="5" max="90" value={ex.inclinacion || ''} onChange={e => updateEx(i, 'inclinacion', parseInt(e.target.value) || '')}
                            placeholder="ej: 45" className="w-full bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1.5 text-sm outline-none transition" />
                        </div>
                      )}
                      {ex.tipoResistencia === 'Goma elástica' && (
                        <div>
                          <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nivel de goma</label>
                          <select value={ex.nivelGoma || ''} onChange={e => updateEx(i, 'nivelGoma', e.target.value)}
                            className="w-full bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1.5 text-xs outline-none transition">
                            <option value="">Seleccionar</option>
                            {['Ligera','Media','Fuerte','Extra fuerte'].map(n => <option key={n} value={n}>{n}</option>)}
                          </select>
                        </div>
                      )}
                    </div>

                    <input type="text" value={ex.notes} onChange={e => updateEx(i, 'notes', e.target.value)}
                      placeholder="Notas (opcional)" className="w-full bg-slate-900 border border-slate-700 focus:border-lime-500 rounded px-2 py-1 text-xs outline-none" />
                  </div>
                ))}
              </div>
            </div>
            <button onClick={handleSubmit} className="w-full btn-glow py-3 rounded-xl flex items-center justify-center gap-2">
              <Save className="w-5 h-5" />{editing ? 'Guardar cambios' : 'Crear entrenamiento'}
            </button>
          </div>
        </Modal>
      );
    }

    /* ── UI helpers ─────────────────────────────────────────────────────── */
    function Modal({ title, children, onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4"
          style={{ background: 'rgba(2,8,23,0.8)', backdropFilter: 'blur(16px)' }}>
          <div className="modal-sheet w-full max-w-2xl max-h-[92vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl"
            style={{ background: 'rgba(10,18,35,0.97)', border: '1px solid rgba(255,255,255,0.08)', boxShadow: '0 -20px 80px rgba(0,0,0,0.6)' }}>
            {/* Header del modal con acento */}
            <div className="sticky top-0 z-10 px-5 py-4 flex items-center justify-between rounded-t-3xl"
              style={{ background: 'rgba(10,18,35,0.98)', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
              <div className="flex items-center gap-3">
                <div className="w-1 h-6 rounded-full" style={{ background: 'linear-gradient(to bottom, #a3e635, #22d3ee)' }} />
                <h3 className="font-black text-lg">{title}</h3>
              </div>
              <button onClick={onClose}
                className="w-8 h-8 rounded-xl flex items-center justify-center transition-all text-slate-500 hover:text-white"
                style={{ background: 'rgba(255,255,255,0.05)' }}>
                <X className="w-4 h-4" />
              </button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function Input({ label, value, onChange, type = 'text', placeholder }) {
      return (
        <div>
          <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">{label}</label>
          <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            className="w-full rounded-xl px-3 py-2.5 text-sm outline-none transition-all"
            style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.1)', color: '#fff' }}
            onFocus={e => e.target.style.borderColor = 'rgba(163,230,53,0.5)'}
            onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,0.1)'} />
        </div>
      );
    }

    function MiniInput({ label, value, onChange, step }) {
      return (
        <div>
          <label className="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">{label}</label>
          <input type="number" value={value} step={step} onChange={e => onChange(e.target.value)}
            className="w-full rounded-lg px-2 py-1.5 text-sm outline-none transition-all"
            style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.1)', color: '#fff' }}
            onFocus={e => e.target.style.borderColor = 'rgba(163,230,53,0.5)'}
            onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,0.1)'} />
        </div>
      );
    }

    /* ── Calendario ─────────────────────────────────────────────────────── */
    function Calendario({ sessions, clients, workouts, onSaveSessions }) {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [selectedDay, setSelectedDay] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editingSession, setEditingSession] = useState(null);

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfWeek = (new Date(year, month, 1).getDay() + 6) % 7; // 0=Lun

      const today = new Date();
      const isToday = (d) => today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;

      // Agrupar sesiones por día del mes actual
      const byDay = {};
      sessions.forEach(s => {
        const sd = new Date(s.date);
        if (sd.getFullYear() === year && sd.getMonth() === month) {
          const d = sd.getDate();
          if (!byDay[d]) byDay[d] = [];
          byDay[d].push(s);
        }
      });

      const selectedDateStr = selectedDay
        ? `${year}-${String(month + 1).padStart(2, '0')}-${String(selectedDay).padStart(2, '0')}`
        : null;

      const selectedSessions = selectedDay
        ? (byDay[selectedDay] || []).slice().sort((a, b) => a.time.localeCompare(b.time))
        : [];

      const addSession = (session) => {
        if (editingSession) {
          onSaveSessions(sessions.map(s => s.id === editingSession.id ? { ...session, id: editingSession.id } : s));
          setEditingSession(null);
          showToast('Sesión actualizada ✓', 'info');
        } else {
          onSaveSessions([...sessions, { ...session, id: Date.now().toString() }]);
          fireConfetti();
          showToast('¡Sesión añadida al calendario! 🗓️');
        }
        setShowForm(false);
      };

      const deleteSession = (id) => {
        if (confirm('¿Eliminar esta sesión del calendario?')) {
          onSaveSessions(sessions.filter(s => s.id !== id));
          showToast('Sesión eliminada', 'error');
        }
      };

      // Celdas del grid: vacías + días del mes
      const cells = Array(firstDayOfWeek).fill(null).concat(Array.from({ length: daysInMonth }, (_, i) => i + 1));

      return (
        <div className="space-y-6 animate-slide-up">
          <div>
            <h2 className="text-3xl md:text-4xl font-black"><span className="gradient-text">Calendario</span></h2>
            <p className="text-slate-500 text-sm mt-1">Organiza tus sesiones presenciales</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
            {/* ── Mes ── */}
            <div className="lg:col-span-2 rounded-2xl p-5"
              style={{ background: 'rgba(10,18,35,0.9)', border: '1px solid rgba(255,255,255,0.07)' }}>
              {/* Cabecera navegación */}
              <div className="flex items-center justify-between mb-5">
                <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))}
                  className="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-lime-400 transition-all"
                  style={{ background: 'rgba(255,255,255,0.04)' }}>
                  <ArrowLeft className="w-4 h-4" />
                </button>
                <h3 className="font-black text-lg gradient-text">{MONTHS[month]} {year}</h3>
                <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))}
                  className="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-lime-400 transition-all"
                  style={{ background: 'rgba(255,255,255,0.04)' }}>
                  <ChevronRight className="w-4 h-4" />
                </button>
              </div>

              {/* Encabezados días */}
              <div className="grid grid-cols-7 mb-2">
                {['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => (
                  <div key={d} className="text-center text-[10px] font-bold text-slate-600 tracking-wider py-1 uppercase">{d}</div>
                ))}
              </div>

              {/* Grid días */}
              <div className="grid grid-cols-7 gap-1">
                {cells.map((day, i) => {
                  if (!day) return <div key={`e${i}`} />;
                  const daySessions = byDay[day] || [];
                  const selected = selectedDay === day;
                  const todayMark = isToday(day);
                  // Colores únicos por cliente del día
                  const clientColors = ['#a3e635','#22d3ee','#34d399','#f59e0b','#a78bfa'];
                  return (
                    <button key={day} onClick={() => setSelectedDay(selected ? null : day)}
                      className={`min-h-[44px] flex flex-col items-center py-1 px-0.5 rounded-xl transition-all font-semibold text-sm
                        ${selected ? 'bg-lime-400 text-slate-950' : todayMark ? 'ring-2 ring-lime-500 bg-lime-400/10 text-lime-300' : 'hover:bg-slate-800 text-slate-300'}`}>
                      <span>{day}</span>
                      {daySessions.length > 0 && (
                        <div className="flex gap-0.5 mt-0.5 flex-wrap justify-center">
                          {daySessions.slice(0, 4).map((s, idx) => {
                            const ci = clients.findIndex(c => c.id === s.clientId);
                            return <div key={idx} className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: selected ? '#0f172a' : clientColors[ci % clientColors.length] }} />;
                          })}
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* Leyenda clientes */}
              {clients.length > 0 && (
                <div className="mt-4 pt-4 border-t border-slate-800 flex flex-wrap gap-3">
                  {clients.map((c, i) => {
                    const colors = ['#a3e635','#22d3ee','#34d399','#f59e0b','#a78bfa'];
                    return (
                      <div key={c.id} className="flex items-center gap-1.5 text-xs text-slate-400">
                        <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: colors[i % colors.length] }} />
                        {c.name}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* ── Panel lateral ── */}
            <div className="space-y-3">
              {selectedDay ? (
                <>
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="font-black text-lg">{selectedDay} de {MONTHS[month]}</div>
                      <div className="text-xs text-slate-400">{selectedSessions.length} {selectedSessions.length === 1 ? 'sesión' : 'sesiones'}</div>
                    </div>
                    <button onClick={() => { setEditingSession(null); setShowForm(true); }}
                      className="bg-lime-400 hover:bg-lime-300 text-slate-950 font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 text-sm transition">
                      <Plus className="w-4 h-4" />Nueva
                    </button>
                  </div>

                  {selectedSessions.length === 0 ? (
                    <div className="bg-slate-900 border border-slate-800 border-dashed rounded-2xl p-6 text-center">
                      <Calendar className="w-8 h-8 text-slate-700 mx-auto mb-2" />
                      <p className="text-sm text-slate-400">Sin sesiones este día</p>
                      <button onClick={() => { setEditingSession(null); setShowForm(true); }}
                        className="mt-3 text-sm text-lime-400 hover:text-lime-300 font-semibold">
                        + Añadir sesión
                      </button>
                    </div>
                  ) : (
                    selectedSessions.map(s => {
                      const client = clients.find(c => c.id === s.clientId);
                      const workout = workouts.find(w => w.id === s.workoutId);
                      const ci = clients.findIndex(c => c.id === s.clientId);
                      const colors = ['#a3e635','#22d3ee','#34d399','#f59e0b','#a78bfa'];
                      return (
                        <div key={s.id} className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                          {/* Franja de color del cliente */}
                          <div className="h-1" style={{ backgroundColor: colors[ci % colors.length] }} />
                          <div className="p-4">
                            <div className="flex items-start justify-between gap-2 mb-2">
                              <div className="flex items-center gap-2">
                                <div className="w-9 h-9 rounded-lg flex items-center justify-center text-slate-950 font-black text-sm"
                                  style={{ backgroundColor: colors[ci % colors.length] }}>
                                  {client?.name.charAt(0).toUpperCase() || '?'}
                                </div>
                                <div>
                                  <div className="font-bold text-sm">{client?.name || 'Cliente eliminado'}</div>
                                  <div className="flex items-center gap-2">
                                    <div className="text-xs font-black text-lime-400">⏰ {s.time}</div>
                                    {s.tipo && <div className="text-[10px] font-bold text-slate-500 bg-slate-800 px-1.5 py-0.5 rounded">{s.tipo}</div>}
                                  </div>
                                </div>
                              </div>
                              <div className="flex gap-1 flex-shrink-0">
                                <button onClick={() => { setEditingSession(s); setShowForm(true); }}
                                  className="p-1.5 text-slate-400 hover:text-lime-400 transition">
                                  <Edit2 className="w-3.5 h-3.5" />
                                </button>
                                <button onClick={() => deleteSession(s.id)}
                                  className="p-1.5 text-slate-400 hover:text-red-400 transition">
                                  <Trash2 className="w-3.5 h-3.5" />
                                </button>
                              </div>
                            </div>

                            {workout ? (
                              <div className="bg-slate-950 rounded-lg p-3 mt-1">
                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Entreno asignado</div>
                                <div className="font-bold text-sm">{workout.name}</div>
                                <div className="text-xs text-slate-400 mt-1 flex flex-wrap gap-2">
                                  <span className="text-lime-400/80">{workout.type || 'Funcional'}</span>
                                  <span>· {workout.exercises?.length || 0} ejercicios</span>
                                  {workout.duration && <span>· {workout.duration} min</span>}
                                </div>
                                {workout.exercises && workout.exercises.length > 0 && (
                                  <div className="mt-2 space-y-1">
                                    {workout.exercises.slice(0, 3).map((ex, idx) => (
                                      <div key={idx} className="text-xs text-slate-500 flex items-center gap-1">
                                        <span className="text-lime-400/60">{idx + 1}.</span> {ex.name}
                                        <span className="text-slate-600">— {ex.sets}×{ex.reps}</span>
                                      </div>
                                    ))}
                                    {workout.exercises.length > 3 && (
                                      <div className="text-xs text-slate-600">+{workout.exercises.length - 3} más...</div>
                                    )}
                                  </div>
                                )}
                              </div>
                            ) : (
                              <div className="text-xs text-slate-600 italic mt-1">Sin entreno asignado</div>
                            )}

                            {s.notes && <p className="text-xs text-slate-400 italic mt-2">"{s.notes}"</p>}
                          </div>
                        </div>
                      );
                    })
                  )}
                </>
              ) : (
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-8 text-center">
                  <Calendar className="w-12 h-12 text-slate-700 mx-auto mb-3" />
                  <p className="text-sm text-slate-400">Pulsa un día para ver las sesiones o añadir una nueva</p>
                </div>
              )}
            </div>
          </div>

          {showForm && (
            <SessionForm
              clients={clients}
              workouts={workouts}
              date={selectedDateStr}
              editing={editingSession}
              onSave={addSession}
              onClose={() => { setShowForm(false); setEditingSession(null); }}
            />
          )}
        </div>
      );
    }

    function SessionForm({ clients, workouts, date, editing, onSave, onClose }) {
      const [form, setForm] = useState(editing || {
        date: date || new Date().toISOString().split('T')[0],
        time: '09:00',
        clientId: clients[0]?.id || '',
        tipo: 'Funcional',
        workoutId: '',
        notes: '',
      });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const clientWorkouts = workouts.filter(w => w.clientId === form.clientId);

      const handleClientChange = (v) => setForm(f => ({ ...f, clientId: v, workoutId: '' }));

      const handleSubmit = () => {
        if (!form.clientId) return alert('Selecciona un cliente');
        if (!form.date) return alert('Indica la fecha');
        if (!form.time) return alert('Indica la hora de la sesión');
        onSave(form);
      };

      const TIPOS = ['Funcional', 'TRX', 'Mixto', 'Cardio', 'Fuerza', 'Movilidad'];

      return (
        <Modal title={editing ? 'Editar sesión' : 'Nueva sesión'} onClose={onClose}>
          <div className="space-y-4">

            {/* Cliente */}
            <div>
              <label className="block text-sm font-semibold text-slate-300 mb-1">Cliente *</label>
              <select value={form.clientId} onChange={e => handleClientChange(e.target.value)}
                className="w-full bg-slate-950 border border-slate-700 focus:border-lime-500 rounded-lg px-3 py-2 text-sm outline-none transition">
                <option value="">Selecciona un cliente</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>

            {/* Fecha y hora — destacadas */}
            <div className="bg-slate-950 rounded-xl p-4 border border-slate-700">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Fecha y hora *</div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-slate-400 mb-1">Día</label>
                  <input type="date" value={form.date} onChange={e => set('date', e.target.value)}
                    className="w-full bg-slate-900 border border-slate-600 focus:border-lime-500 rounded-lg px-3 py-2.5 text-sm outline-none transition font-semibold" />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-400 mb-1">Hora</label>
                  <input type="time" value={form.time} onChange={e => set('time', e.target.value)}
                    className="w-full bg-slate-900 border border-slate-600 focus:border-lime-500 rounded-lg px-3 py-2.5 text-sm outline-none transition font-black text-lime-400" />
                </div>
              </div>
            </div>

            {/* Tipo de entrenamiento */}
            <div>
              <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-2">Tipo de entrenamiento *</label>
              <div className="flex flex-wrap gap-2">
                {TIPOS.map(t => (
                  <button key={t} type="button" onClick={() => set('tipo', t)}
                    className="px-3 py-1.5 rounded-xl text-sm font-bold transition-all"
                    style={form.tipo === t
                      ? { background: 'linear-gradient(135deg,#a3e635,#65a30d)', color: '#020817', boxShadow: '0 4px 14px rgba(163,230,53,0.4)' }
                      : { background: 'rgba(255,255,255,0.05)', color: '#94a3b8', border: '1px solid rgba(255,255,255,0.08)' }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>

            {/* Entrenamiento vinculado */}
            <div>
              <label className="block text-sm font-semibold text-slate-300 mb-1">Entreno vinculado <span className="text-slate-500 font-normal">(opcional)</span></label>
              <select value={form.workoutId} onChange={e => set('workoutId', e.target.value)}
                className="w-full bg-slate-950 border border-slate-700 focus:border-lime-500 rounded-lg px-3 py-2 text-sm outline-none transition">
                <option value="">— Sin entreno asignado —</option>
                {clientWorkouts.map(w => <option key={w.id} value={w.id}>{w.name} · {w.type || 'Funcional'} · {w.exercises?.length || 0} ej.</option>)}
              </select>
              {form.clientId && clientWorkouts.length === 0 && (
                <p className="text-xs text-slate-500 mt-1">Este cliente aún no tiene entrenamientos creados.</p>
              )}
            </div>

            {/* Notas */}
            <div>
              <label className="block text-sm font-semibold text-slate-300 mb-1">Notas</label>
              <textarea value={form.notes} onChange={e => set('notes', e.target.value)} rows={2}
                className="w-full bg-slate-950 border border-slate-700 focus:border-lime-500 rounded-lg px-3 py-2 text-sm outline-none transition resize-none"
                placeholder="Observaciones, material necesario..." />
            </div>

            <button onClick={handleSubmit} className="w-full btn-glow py-3 rounded-xl flex items-center justify-center gap-2">
              <Save className="w-5 h-5" />{editing ? 'Guardar cambios' : 'Crear sesión'}
            </button>
          </div>
        </Modal>
      );
    }

    /* ── Mount ──────────────────────────────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(
      <React.StrictMode>
        <EntrenamientosMestre />
      </React.StrictMode>
    );
  </script>
</body>
</html>
